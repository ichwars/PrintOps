  <title id="title">PrintOps Logo</title>
  <desc id="desc">Sauberes vektorbasiertes PrintOps Logo mit Bildmarke und Schriftzug, transparentem Hintergrund und ohne eingebettete Rastergrafik.</desc>
  <defs>
    <linearGradient id="po-dark" x1="0" y1="0" x2="0" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2930"/>
      <stop offset="0.52" stop-color="#34414A"/>
      <stop offset="1" stop-color="#182229"/>
    </linearGradient>
    <linearGradient id="po-teal" x1="0" y1="0" x2="0" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12C9C2"/>
      <stop offset="0.55" stop-color="#04AAA4"/>
      <stop offset="1" stop-color="#159B98"/>
    </linearGradient>
    <linearGradient id="po-word-dark" x1="428" y1="119" x2="428" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2930"/>
      <stop offset="0.52" stop-color="#2B363E"/>
      <stop offset="1" stop-color="#182229"/>
    </linearGradient>
    <linearGradient id="po-word-teal" x1="879" y1="119" x2="879" y2="305" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12C9C2"/>
      <stop offset="0.55" stop-color="#04AAA4"/>
      <stop offset="1" stop-color="#159B98"/>
    </linearGradient>
  </defs>

  <g id="printops-logo">

